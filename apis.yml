apis:
  - aid: microsoft-dynamics:business-central-api
    name: Microsoft Dynamics 365 Business Central API
    tags:
      - ERP
      - Finance
      - Business Central
    humanURL: https://learn.microsoft.com/en-us/dynamics365/business-central/dev-itpro/api-reference/v2.0/
    properties:
      - url: https://learn.microsoft.com/en-us/dynamics365/business-central/dev-itpro/api-reference/v2.0/
        type: Documentation
      - url: openapi/microsoft-dynamics-business-central-openapi.yml
        type: OpenAPI
      - url: json-schema/customer.json
        type: JSONSchema
      - url: json-schema/vendor.json
        type: JSONSchema
      - url: json-schema/item.json
        type: JSONSchema
      - url: json-schema/sales-order.json
        type: JSONSchema
      - url: json-schema/sales-invoice.json
        type: JSONSchema
      - url: json-schema/employee.json
        type: JSONSchema
      - url: json-ld/microsoft-dynamics-context.jsonld
        type: JSONLD
    description: >-
      The Microsoft Dynamics 365 Business Central API (v2.0) provides a RESTful
      OData v4 interface for integrating with Business Central. It exposes
      standard business entities including companies, customers, vendors, items,
      sales orders, sales invoices, purchase orders, purchase invoices, journals,
      general ledger entries, accounts, and employees. The API supports both
      cloud (SaaS) and on-premises deployments, authenticated via Microsoft
      Entra ID.
  - aid: microsoft-dynamics:dataverse-web-api
    name: Microsoft Dynamics 365 Dataverse Web API
    tags:
      - CRM
      - Sales
      - Customer Engagement
    humanURL: https://learn.microsoft.com/en-us/power-apps/developer/data-platform/webapi/overview
    properties:
      - url: https://learn.microsoft.com/en-us/power-apps/developer/data-platform/webapi/overview
        type: Documentation
      - url: openapi/microsoft-dynamics-dataverse-openapi.yml
        type: OpenAPI
      - url: json-schema/account.json
        type: JSONSchema
      - url: json-schema/contact.json
        type: JSONSchema
      - url: json-schema/lead.json
        type: JSONSchema
      - url: json-schema/opportunity.json
        type: JSONSchema
      - url: json-ld/microsoft-dynamics-context.jsonld
        type: JSONLD
    description: >-
      The Microsoft Dynamics 365 Dataverse Web API provides a RESTful OData v4
      endpoint for Dynamics 365 Sales, Customer Service, Field Service, and
      other customer engagement applications. It supports CRUD operations on
      core CRM entities such as accounts, contacts, leads, opportunities, cases
      (incidents), and activities. Authentication is handled via Microsoft Entra
      ID (Azure AD).
  - aid: microsoft-dynamics:finance-operations-api
    name: Microsoft Dynamics 365 Finance & Operations Data API
    tags:
      - ERP
      - Finance
      - Supply Chain
    humanURL: https://learn.microsoft.com/en-us/dynamics365/fin-ops-core/dev-itpro/data-entities/odata
    properties:
      - url: https://learn.microsoft.com/en-us/dynamics365/fin-ops-core/dev-itpro/data-entities/odata
        type: Documentation
      - url: openapi/microsoft-dynamics-finance-operations-openapi.yml
        type: OpenAPI
      - url: json-ld/microsoft-dynamics-context.jsonld
        type: JSONLD
    description: >-
      The Microsoft Dynamics 365 Finance & Operations Data API exposes business
      data entities via OData v4 RESTful endpoints. It provides access to
      finance, supply chain, manufacturing, and human resources data including
      customers, vendors, released products, sales order headers, purchase order
      headers, general journal entries, and workers. The API supports cross-
      company queries and is authenticated via Microsoft Entra ID.
