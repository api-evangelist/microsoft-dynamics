description: >-
  Microsoft Dynamics 365 is a suite of enterprise resource planning (ERP) and
  customer relationship management (CRM) applications. It provides APIs across
  three main platforms: Business Central for small and mid-sized business ERP,
  Dataverse Web API for CRM and customer engagement, and Finance & Operations
  for enterprise-grade ERP covering finance, supply chain, manufacturing, and
  human resources. All APIs use OData v4 conventions and authenticate via
  Microsoft Entra ID.
